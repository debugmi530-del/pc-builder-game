name: Build PC Builder Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      - name: Import project (generate .godot folder)
        run: |
          godot --headless --editor --quit 2>&1 | head -80 || true
          sleep 3

      - name: Export Windows EXE
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/PCBuilder.exe 2>&1

      - name: Upload Windows Build as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCBuilder-Windows-${{ github.run_number }}
          path: build/windows/
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "PC Builder — Сборка #${{ github.run_number }}"
          body: |
            ## PC Builder — Автоматическая сборка #${{ github.run_number }}

            ### Как запустить
            1. Скачай **PCBuilder.exe**
            2. Запусти — установка не нужна, работает на чистом Windows!

            ### Управление
            - **WASD** — движение
            - **Мышь** — осмотр
            - **E** — взаимодействие
            - **Shift** — бег
            - **Esc** — пауза
          files: build/windows/PCBuilder.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
